version: '3.7'

services:
    mosquitto:
        restart: unless-stopped
        image: eclipse-mosquitto:2.0.18
        container_name: mosquitto-uns
        mem_limit: 32m
        ports:
            - "1883:1883" # Standard MQTT port for PLCs and Ignition
            - "9001:9001" # WebSockets port for Unity WebGL
        volumes:
            - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    postgres-local:
        restart: unless-stopped
        image: postgres:15-alpine
        container_name: postgres-local
        mem_limit: 128m
        ports:
            - "5432:5432" #Standard PostrageSQL port
        environment:
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD:  ${DB_PASSWORD}
            POSTGRES_DB: ${DB_NAME}
        volumes:
            - postgres_local_data:/var/lib/postgresql/data 
    postgres-cloud:
        restart: unless-stopped
        image: postgres:15-alpine
        container_name: postgres-cloud
        mem_limit: 128m
        ports:
            - "5433:5432" # Mapped o 5433 on host to avoid port conflict
        environment:
            POSTGRES_USER: ${CLOUD_DB_USER}
            POSTGRES_PASSWORD: ${CLOUD_DB_PASSWORD}
            POSTGRES_DB: ${CLOUD_DB_NAME}
        volumes:
            - postgres_cloud_data:/var/lib/postgresql/data      
    ignition:
        restart: unless-stopped
        image: inductiveautomation/ignition:8.1.33
        container_name: ignition-gateway
        mem_limit: 2048m
        ports:
            - "8085:8088" # Web interface port
            - "8043:8043" # Secure web interface port
        environment:
            ACCEPT_EULA: "Y"
            GATEWAY_ADMIN_PASSWORDL: ${IGNITION_PASSWORD}
            GATEWAY_MAX_MEMORY: 1536
            GATEWAY_INIT_MEMORY: 512
        volumes:
            - ignition_data:/usr/local/bin/ignition/data
            - ignition_user_lib:/usr/local/bin/ignition/user-lib
            - ./ignition/projects:/usr/local/bin/ignition/data/projects
            - ./ignition/db:/usr/local/bin/ignition/data/db
    novatech-warsaw-assembly-line1-plc1:
        restart: unless-stopped
        image: martinkellers/codesys:3.5.17
        container_name: novatech-warsaw-assembly-line1-plc1
        mem_limit: 128m
        ports:
            - "11740:11740" # Codesys IDE programing port for PLC 1
        volumes:
            - codesys_data_plc1:/var/opt/codesys
            - ./Codesys/plc1_logic:/var/opt/codesys/PlcLogic
    novatech-warsaw-assembly-line1-plc2:
        restart: unless-stopped
        image: martinkellers/codesys:3.5.17
        container_name: novatech-warsaw-assembly-line1-plc2
        mem_limit: 128m
        ports:
            - "11741:11740" # Codesys IDE programing port for PLC 2
        volumes:
            - codesys_data_plc2:/var/opt/codesys
            - ./Codesys/plc2_logic:/var/opt/codesys/PlcLogic
    azure-bridge:
        restart: unless-stopped
        build:
            context: ./azure-bridge
            dockerfile: Dockerfile
        container_name: azure-bridge
        mem_limit: 64m
        environment:
            - AZURE_EVENTHUB_CONNECTION_STRING=${AZURE_EVENTHUB_CONNECTION_STRING}
            - AZURE_EVENTHUB_NAME=${AZURE_EVENTHUB_NAME}
            - AZURE_EVENTHUB_CONSUMER_GROUP=${AZURE_EVENTHUB_CONSUMER_GROUP}
            - MQTT_BROKER=mosquitto
            - MQTT_PORT=1883
            - MQTT_TOPIC=NovaTech/Warsaw/Assembly/Line1/EdgeAI/Anomaly
        depends_on:
            - mosquitto
volumes:
    postgres_local_data:
    postgres_cloud_data:
    ignition_data:
    ignition_user_lib:
    codesys_data_plc1: # Volume for PLC 1
    codesys_data_plc2: # Volume for PLC 2