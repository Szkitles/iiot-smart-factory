name: Deploy IIoT Stack to VPS

on:
  push:
    branches:
      - master
      - main

jobs:
  # Zadanie 1: Walidacja składni i konfiguracji (CI)
  validate:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Create Mock .env
        run: cp .env.example .env

      - name: Validate Docker Compose Syntax
        run: docker compose config

  # Zadanie 2: Wdrożenie na serwer VPS (CD) - uruchamia się tylko, gdy validate zakończy się sukcesem
  deploy:
    runs-on: ubuntu-22.04
    needs: validate
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        with:
          host: ${{ secrets.VPS_IP }}          # Adres IP serwera
          username: ${{ secrets.VPS_USER }}    # Nazwa użytkownika
          key: ${{ secrets.VPS_SSH_KEY }}      # Prywatny klucz SSH
          port: 22
          envs: ENV_FILE
          script: |
            set -e
            cd ~/iiot-smart-factory
            
            # Pobranie najnowszego kodu z repozytorium
            git pull
            
            # Automatyczne naprawienie uprawnień dla Ignition po pobraniu nowych plików
            sudo chmod -R 777 ~/iiot-smart-factory/ignition
            
            # Dynamiczne odtworzenie pliku .env z sekretu GitHub
            echo "$ENV_FILE" > .env
            
            # Restart i przebudowa kontenerów w tle
            docker-compose down
            docker-compose up -d --build
            
            echo "Deployment completed successfully!"